server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/music_db?useSSL=false&serverTimezone=Asia/Shanghai&rewriteBatchedStatements=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # 生产环境请将以下日志关闭
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# 酷狗音乐 API 配置
# token 来自手机号验证码登录返回的 token 字段
# 可通过环境变量 KUGOU_TOKEN 覆盖
kugou:
  token: ${KUGOU_TOKEN:808524153282c8b3bb50ef7264f5536c817ff1520a5d118aac7c24695f3b55f2}

logging:
  level:
    com.musicrank: DEBUG
    org.springframework.web: INFO
