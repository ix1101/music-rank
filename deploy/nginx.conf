# ============================================
# 音乐排行榜 — music.icey.help 独立站点
# 放在 /etc/nginx/sites-available/music-rank
# 执行: sudo ln -s /etc/nginx/sites-available/music-rank /etc/nginx/sites-enabled/
# ============================================

server {
    listen 80;
    server_name music.icey.help;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name music.icey.help;

    # SSL 证书（certbot 签发后自动填充）
    ssl_certificate     /etc/letsencrypt/live/music.icey.help/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/music.icey.help/privkey.pem;

    # 前端静态文件 (SPA)
    root /home/admin/music-rank/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # 酷狗 API 代理
    location /kugou/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # 静态资源长期缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
