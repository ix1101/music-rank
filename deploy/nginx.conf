# ============================================
# 音乐排行榜 — Nginx 站点配置
# 放在 /etc/nginx/sites-available/music-rank
# 然后在 icey.help 的 server 块中 include 或单独配置
#
# 使用方法（二选一）：
# A. 追加到 icey.help 的 443 server 块尾部
# B. 独立 server 块，用子域名 music.icey.help
#
# 推荐方案 A — 挂载到 icey.help/music/ 下
# 将下面 3 个 location 块追加到 icey.help 的 server 443 配置中
# ============================================

# ---- 方案 A：在 icey.help 443 server 块内添加以下内容 ----

# 音乐排行榜前端（SPA 回退）
location /music/ {
    alias /home/admin/music-rank/frontend/;
    try_files $uri $uri/ /music/index.html;
    index index.html;
}

# 音乐排行榜后端 API
location /music/api/ {
    proxy_pass http://127.0.0.1:8080/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
}

# 酷狗 API 代理
location /music/kugou/ {
    proxy_pass http://127.0.0.1:3000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
}
