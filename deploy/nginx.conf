# Nginx 配置 — 音乐排行榜
# 放到 /etc/nginx/sites-available/music-rank 并软链到 sites-enabled

server {
    listen 80;
    server_name _;

    # 前端静态文件
    root /home/admin/music-rank/frontend;
    index index.html;

    # SPA 路由回退（去掉 # 号后必须）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # 酷狗 API 代理
    location /kugou/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # 静态资源缓存
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 日志
    access_log /var/log/nginx/music-rank-access.log;
    error_log /var/log/nginx/music-rank-error.log;
}
